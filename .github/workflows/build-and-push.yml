name: Build, Scan & Push to GAR

on:
  push:
    branches:
      - main

# Zwingend notwendig für die passwortlose OIDC-Authentifizierung
permissions:
  contents: read
  id-token: write

env:
  # Deine Google Cloud Projekt-Daten
  PROJECT_ID: 'ukk-dev-api-keys-to-be-deleted'
  REGION: 'europe-west3'
  GAR_LOCATION: 'europe-west3-docker.pkg.dev'
  REPOSITORY: 'show-security-repo'
  IMAGE_NAME: 'show-security-image'

  # Die generierten Werte aus deinem Cloud Shell Setup
  SERVICE_ACCOUNT: 'github-actions-sa@ukk-dev-api-keys-to-be-deleted.iam.gserviceaccount.com'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/341431032740/locations/global/workloadIdentityPools/github-pool/providers/github-provider'

jobs:
  build-scan-and-push:
    # Für die Demo nutzen wir die Standard-Runner von GitHub.
    # Im echten KRITIS-Betrieb stünde hier z.B.: runs-on: [self-hosted]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Google Cloud Authentifizierung (OIDC)
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: ⚙️ Docker Auth für Artifact Registry konfigurieren
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: 🛠️ Docker Image bauen
        run: |-
          docker build \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: 🛡️ Schwachstellen-Scan (Trivy) vor dem Push
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: '${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Bricht die Pipeline bei kritischen Lücken sofort ab
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🚀 Push Docker Image to Artifact Registry
        # Wird nur ausgeführt, wenn der Scan oben erfolgreich war
        run: |-
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest


# ... (dein bisheriger build-scan-and-push Job) ...

  dast-scan:
    name: Web Security Scan (DAST)
    runs-on: ubuntu-latest
    # In einer vollständigen Pipeline würde hier "needs: deploy" stehen, 
    # damit der Scan erst startet, wenn die neue Version online ist.
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕵️‍♂️ OWASP ZAP Baseline Scan ausführen
        uses: zaproxy/action-baseline@v0.14.0
        with:
          # Hier steht die Live-URL deiner Cloud Run App aus deinem Screenshot
          target: 'https://show-security-image-341431032740.europe-west1.run.app'
          
          # Wir generieren wieder einen maschinenlesbaren Report für GitHub
          format: 'sarif'
          
          # Für KRITIS: Setze dies auf "true", wenn die Pipeline rot werden 
          # und fehlschlagen soll, sobald ZAP eine Schwachstelle findet.
          # Für den ersten Test lassen wir es auf "false".
          fail_action: false 

      - name: 📊 ZAP Ergebnisse in GitHub Security Tab hochladen
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Lädt die Ergebnisse auch hoch, wenn ZAP Fehler findet
        with:
          sarif_file: 'results.sarif' # Standard-Dateiname der ZAP Action


          
