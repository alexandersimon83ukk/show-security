name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: autobuild
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Autobuild
        if: ${{ matrix.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

      - name: Add CodeQL result note to summary
        if: always()
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## CodeQL Ergebnis-Hinweis

          Dieser Workflow prüft den Code mit CodeQL und lädt die Ergebnisse in GitHub Code Scanning hoch.

          Wichtiger Unterschied:
          - Ein grüner Workflow bedeutet: **Der Scan ist technisch erfolgreich gelaufen**
          - Er bedeutet **nicht automatisch**, dass keine Security Findings existieren

          Wo die echten Findings sichtbar sind:
          - **Pull Requests**: im Bereich **Code scanning results / CodeQL**
          - **Main Branch / Push**: unter **Security > Code scanning alerts**

          Prüfe bei verdächtigem Code daher immer zusätzlich:
          - Security → Code scanning
          - Pull Request Checks
          EOF
