name: DAST / Web Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-security-scan:
    name: Web Security Scan (DAST)
    runs-on: ubuntu-latest

    env:
      ZAP_TARGET_URL: https://show-security-image-341431032740.europe-west1.run.app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run OWASP ZAP baseline scan
        id: zap_scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.ZAP_TARGET_URL }}
          allow_issue_writing: false
          fail_action: false
          artifact_name: web_security_scan_dast

      - name: Build DAST Pages artifact
        if: always()
        run: |
          python scripts/build_dast_pages.py --output-dir artifacts/pages/dast
          cp artifacts/pages/dast/summary.md zap-summary.md

      - name: Summarize OWASP ZAP results
        if: always()
        run: cat zap-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-security-scan-dast
          path: |
            report_html.html
            report_md.md
            report_json.json
            zap-summary.md
          if-no-files-found: warn

      - name: Upload DAST Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-dast
          path: artifacts/pages/dast/
          if-no-files-found: error
          retention-days: 7
