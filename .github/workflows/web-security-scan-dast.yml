name: Web Security Scan (DAST)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-security-scan:
    name: Web Security Scan (DAST)
    runs-on: ubuntu-latest

    env:
      ZAP_TARGET_URL: https://show-security-image-341431032740.europe-west1.run.app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run OWASP ZAP baseline scan
        id: zap_scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.ZAP_TARGET_URL }}
          allow_issue_writing: false
          fail_action: false
          artifact_name: web_security_scan_dast

      - name: Summarize OWASP ZAP results
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          report_file = Path('report_md.md')
          summary_lines = ['# Web Security Scan (DAST)', '']

          if not report_file.exists():
              summary_lines.append('- The ZAP baseline scan did not produce a Markdown report (`report_md.md`) in this run.')
          else:
              report_text = report_file.read_text(encoding='utf-8', errors='ignore')

              table_match = re.search(
                  r"Summary of Alerts\s*\n(?:.*?\n)*?\|\s*Risk Level\s*\|\s*Number of Alerts\s*\|\s*\n\|(?:[^\n]+)\|\s*\n((?:\|[^\n]+\n)+)",
                  report_text,
                  re.IGNORECASE,
              )
              rows = []
              if table_match:
                  for raw_line in table_match.group(1).splitlines():
                      columns = [column.strip() for column in raw_line.strip().strip('|').split('|')]
                      if len(columns) >= 2:
                          rows.append((columns[0], columns[1]))

              false_positive_match = re.search(r"False Positives:\s*(\d+)", report_text, re.IGNORECASE)
              false_positives = false_positive_match.group(1) if false_positive_match else 'n/a'

              summary_lines.extend([
                  '| Risk Level | Number of Alerts |',
                  '| --- | ---: |',
              ])

              if rows:
                  summary_lines.extend(f'| {risk} | {count} |' for risk, count in rows)
              else:
                  summary_lines.append('| Summary unavailable | Report could not be parsed |')

              summary_lines.extend([
                  '',
                  f'- False Positives: **{false_positives}**',
              ])

          summary = '\n'.join(summary_lines) + '\n'

          (Path.cwd() / 'zap-summary.md').write_text(summary, encoding='utf-8')
          PY
          cat zap-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-security-scan-dast
          path: |
            report_html.html
            report_md.md
            report_json.json
            zap-summary.md
          if-no-files-found: warn
