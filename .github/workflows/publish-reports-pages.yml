name: Publish Reports to GitHub Pages

on:
  workflow_run:
    workflows:
      - Quality / Tests and Coverage
      - DAST / Web Security Scan
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  publish-reports:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download latest coverage and DAST Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/downloads artifacts/site/coverage artifacts/site/dast

          download_latest_artifact() {
            local workflow_file="$1"
            local artifact_name="$2"
            local target_dir="$3"

            local run_id
            run_id=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${REPOSITORY}/actions/workflows/${workflow_file}/runs?branch=main&status=success&per_page=1" \
              --jq '.workflow_runs[0].id')

            if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
              echo "No successful run found for ${workflow_file}" >&2
              exit 1
            fi

            local artifact_id
            artifact_id=$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${REPOSITORY}/actions/runs/${run_id}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${artifact_name}\") | .id" | head -n1)

            if [ -z "${artifact_id}" ] || [ "${artifact_id}" = "null" ]; then
              echo "Artifact ${artifact_name} not found for run ${run_id}" >&2
              exit 1
            fi

            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "artifacts/downloads/${artifact_name}.zip"

            unzip -oq "artifacts/downloads/${artifact_name}.zip" -d "${target_dir}"
          }

          download_latest_artifact tests-and-coverage.yml github-pages-coverage artifacts/site/coverage
          download_latest_artifact web-security-scan-dast.yml github-pages-dast artifacts/site/dast

      - name: Build GitHub Pages landing page
        run: |
          cat <<'HTML' > artifacts/site/index.html
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>show-security reports</title>
              <style>
                body {
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  margin: 2rem;
                  line-height: 1.5;
                  color: #1f2328;
                }
                a {
                  color: #0969da;
                }
                .cards {
                  display: grid;
                  gap: 1rem;
                  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                  margin-top: 1.5rem;
                }
                .card {
                  border: 1px solid #d0d7de;
                  border-radius: 12px;
                  padding: 1rem 1.25rem;
                }
              </style>
            </head>
            <body>
              <h1>show-security reports</h1>
              <p>This GitHub Pages deployment publishes the latest main-branch coverage and DAST reports from their dedicated workflows.</p>
              <div class="cards">
                <section class="card">
                  <h2>Coverage report</h2>
                  <p>HTML code coverage generated by the <code>Quality / Tests and Coverage</code> workflow.</p>
                  <p><a href="./coverage/index.html">Open coverage report</a></p>
                </section>
                <section class="card">
                  <h2>DAST scan results</h2>
                  <p>OWASP ZAP output generated by the <code>DAST / Web Security Scan</code> workflow.</p>
                  <p><a href="./dast/index.html">Open DAST report page</a></p>
                </section>
              </div>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add GitHub Pages links to summary
        if: always()
        run: |
          echo "## 🌐 Published reports" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Landing page: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage report: ${{ steps.deployment.outputs.page_url }}coverage/" >> "$GITHUB_STEP_SUMMARY"
          echo "- DAST report page: ${{ steps.deployment.outputs.page_url }}dast/" >> "$GITHUB_STEP_SUMMARY"
